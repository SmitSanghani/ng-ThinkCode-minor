<div class="max-w-[900px] mx-auto space-y-8 animate-in slide-in-from-bottom duration-500">
    <!-- Header -->
    <div class="flex flex-col gap-1">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Add New Question</h2>
        <p class="text-slate-500 font-medium">Create a new JavaScript practice challenge for your students.</p>
    </div>

    <form [formGroup]="questionForm" (ngSubmit)="onSubmit()" class="space-y-8 pb-12">
        <!-- Section 1: Basic Info -->
        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                Basic Information
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-sm font-bold text-slate-700 uppercase tracking-wider">Question Title</label>
                    <input type="text" formControlName="title" placeholder="e.g. Reverse a String"
                        class="w-full bg-slate-50 border-slate-200 focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 rounded-xl px-4 py-3 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 uppercase tracking-wider">Difficulty</label>
                    <select formControlName="difficulty"
                        class="w-full bg-slate-50 border-slate-200 focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 rounded-xl px-4 py-3 transition-all appearance-none">
                        <option value="easy">🟢 Easy</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="hard">🔴 Hard</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 uppercase tracking-wider">Category</label>
                    <select formControlName="category"
                        class="w-full bg-slate-50 border-slate-200 focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 rounded-xl px-4 py-3 transition-all appearance-none">
                        <option value="Arrays">Arrays</option>
                        <option value="Strings">Strings</option>
                        <option value="Objects">Objects</option>
                        <option value="Functions">Functions</option>
                        <option value="Algorithms">Algorithms</option>
                        <option value="Data Structures">Data Structures</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Section 2: Description -->
        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                Problem Description
            </h3>
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 uppercase tracking-wider">Content (Markdown
                    supported)</label>
                <textarea formControlName="description" rows="8"
                    placeholder="Describe the problem, constraints, and provide examples..."
                    class="w-full bg-slate-50 border-slate-200 focus:border-indigo-600 focus:ring-4 focus:ring-indigo-600/10 rounded-xl px-4 py-4 transition-all font-mono text-sm"></textarea>
            </div>
        </div>

        <!-- Section 3: Test Cases -->
        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                    Test Cases
                </h3>
                <button type="button" (click)="addTestCase()"
                    class="text-indigo-600 font-bold text-sm hover:text-indigo-700 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add Test Case
                </button>
            </div>

            <div formArrayName="testCases" class="space-y-4">
                <div *ngFor="let tc of testCases.controls; let i=index" [formGroupName]="i"
                    class="p-6 bg-slate-50 rounded-xl border border-slate-100 relative group">
                    <button type="button" (click)="removeTestCase(i)" *ngIf="testCases.length > 1"
                        class="absolute top-4 right-4 text-slate-400 hover:text-rose-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Input</label>
                            <input type="text" formControlName="input" placeholder="e.g. 'hello'"
                                class="w-full bg-white border-slate-200 focus:border-indigo-600 rounded-lg px-3 py-2 font-mono text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Expected
                                Output</label>
                            <input type="text" formControlName="expectedOutput" placeholder="e.g. 'olleh'"
                                class="w-full bg-white border-slate-200 focus:border-indigo-600 rounded-lg px-3 py-2 font-mono text-sm">
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" formControlName="isHidden" id="hidden-{{i}}"
                                class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-600">
                            <label for="hidden-{{i}}" class="text-xs font-semibold text-slate-600">Hide from
                                students</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 4: Solution -->
        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
                Reference Solution (Optional)
            </h3>
            <div class="space-y-2">
                <textarea formControlName="referenceSolution" rows="6" placeholder="function solution() { ... }"
                    class="w-full bg-slate-900 text-indigo-300 border-none focus:ring-0 rounded-xl px-4 py-4 transition-all font-mono text-sm"></textarea>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="flex justify-end items-center gap-4 pt-4 border-t border-slate-200">
            <button type="button"
                class="px-6 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-all">Cancel</button>
            <button type="submit" [disabled]="questionForm.invalid || isLoading"
                class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:translate-y-0">
                {{ isLoading ? 'Creating...' : 'Add Question' }}
            </button>
        </div>
    </form>
</div>
