<div class="space-y-8 animate-in fade-in duration-500">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div class="flex flex-col gap-1">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Manage Questions</h2>
            <p class="text-slate-500 font-medium">Create, edit, and organize your practice challenges.</p>
        </div>
        <a routerLink="add"
            class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Add Question
        </a>
    </div>

    <!-- Filters & Search -->
    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-center">
        <div class="flex-1 min-w-[300px] relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" placeholder="Search by title or category..."
                class="w-full bg-slate-50 border-transparent focus:bg-white focus:border-indigo-600 focus:ring-0 rounded-xl pl-10 pr-4 py-2.5 text-sm transition-all">
        </div>

        <select
            class="bg-slate-50 border-transparent focus:bg-white focus:border-indigo-600 focus:ring-0 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-all">
            <option value="">All Difficulties</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <select
            class="bg-slate-50 border-transparent focus:bg-white focus:border-indigo-600 focus:ring-0 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 transition-all">
            <option value="">All Categories</option>
            <option value="Arrays">Arrays</option>
            <option value="Strings">Strings</option>
            <option value="Objects">Objects</option>
        </select>
    </div>

    <!-- Table Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Question Title
                        </th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Difficulty</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Category</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Created</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">
                            Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr *ngFor="let q of questions" class="hover:bg-slate-50/50 transition-colors group">
                        <td class="px-6 py-4">
                            <span class="font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">{{
                                q.title }}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span [ngClass]="{
                'bg-emerald-100 text-emerald-700': q.difficulty === 'easy',
                'bg-amber-100 text-amber-700': q.difficulty === 'medium',
                'bg-rose-100 text-rose-700': q.difficulty === 'hard'
              }" class="px-2.5 py-0.5 rounded-full text-[11px] font-extrabold uppercase tracking-wider">
                                {{ q.difficulty }}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-slate-600 font-medium text-sm">{{ q.category }}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-slate-400 text-sm italic">{{ q.createdAt | date:'mediumDate' }}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                    </svg>
                                </button>
                                <button (click)="deleteQuestion(q._id)"
                                    class="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <!-- Empty State -->
                    <tr *ngIf="questions.length === 0 && !isLoading">
                        <td colspan="5" class="px-6 py-20 text-center">
                            <div class="flex flex-col items-center gap-2">
                                <div
                                    class="w-16 h-16 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>
                                <p class="text-slate-500 font-bold mt-2">No questions found</p>
                                <button routerLink="add"
                                    class="text-indigo-600 font-bold text-sm hover:underline">Create your first
                                    question</button>
                            </div>
                        </td>
                    </tr>
                    <!-- Loading State -->
                    <tr *ngIf="isLoading">
                        <td colspan="5" class="px-6 py-20 text-center text-slate-400 font-medium">Loading challenges...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
