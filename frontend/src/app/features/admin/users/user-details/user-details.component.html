<div class="user-details-container ">
    <div class="header mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold">User Details</h1>
        <button (click)="goBack()" class="px-4 py-2 bg-slate-200 rounded hover:bg-slate-300">Back</button>
    </div>

    <div *ngIf="loading" class="p-12 text-center text-slate-500">Loading user info...</div>

    <div *ngIf="!loading && user" class="user-card bg-white p-6 rounded-xl border border-slate-200">
        <div class="grid grid-cols-2 gap-4">
            <div><strong>Name:</strong> {{ user.name }}</div>
            <div><strong>Email:</strong> {{ user.email }}</div>
            <div><strong>Role:</strong> {{ user.role }}</div>
            <div><strong>Status:</strong> {{ user.status }}</div>
            <div><strong>Joined:</strong> {{ user.createdAt | date:'mediumDate' }}</div>
            <div><strong>Total Submissions:</strong> {{ user.submissionCount }}</div>
        </div>
    </div>

    <div *ngIf="!loading && error" class="p-6 bg-red-50 text-red-600 rounded-xl border border-red-100">
        {{ error }}
    </div>
</div>
