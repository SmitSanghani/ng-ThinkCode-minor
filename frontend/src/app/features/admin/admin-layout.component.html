<div class="flex h-screen bg-background font-sans overflow-hidden text-text-primary">
    <!-- Sidebar -->
    <aside class="w-[260px] bg-[#1E2532] text-slate-400 flex flex-col transition-all duration-300 relative z-40">
        <!-- Logo Area -->
        <div class="h-20 flex items-center px-6 mb-4 cursor-pointer hover:opacity-80 transition-opacity" routerLink="/">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="text-white font-bold text-xl">T</span>
                </div>
                <span class="text-white font-semibold text-xl tracking-tight">ThinkCode</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 space-y-1 overflow-y-auto">
            <a routerLink="/admin/dashboard" routerLinkActive="bg-[#1E2532] text-white !border-cyan-400"
                class="flex items-center gap-4 px-8 py-4 hover:bg-white/5 hover:text-white transition-all duration-150 group border-l-[4px] border-transparent">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="font-medium text-[15px]">Dashboard</span>
            </a>

            <a routerLink="/admin/questions/add" routerLinkActive="bg-[#1E2532] text-white !border-cyan-400"
                class="flex items-center gap-4 px-8 py-4 hover:bg-white/5 hover:text-white transition-all duration-150 group border-l-[4px] border-transparent">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="font-medium text-[15px]">Add Question</span>
            </a>

            <a routerLink="/admin/questions" routerLinkActive="bg-[#1E2532] text-white !border-cyan-400"
                [routerLinkActiveOptions]="{exact: false}"
                class="flex items-center gap-4 px-8 py-4 hover:bg-white/5 hover:text-white transition-all duration-150 group border-l-[4px] border-transparent">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
                <span class="font-medium text-[15px]">All Questions</span>
            </a>

            <a routerLink="/admin/users" routerLinkActive="bg-[#1E2532] text-white !border-cyan-400"
                class="flex items-center gap-4 px-8 py-4 hover:bg-white/5 hover:text-white transition-all duration-150 group border-l-[4px] border-transparent">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="font-medium text-[15px]">Users</span>
            </a>

            <a routerLink="/admin/submissions" routerLinkActive="bg-[#1E2532] text-white !border-cyan-400"
                class="flex items-center gap-4 px-8 py-4 hover:bg-white/5 hover:text-white transition-all duration-150 group border-l-[4px] border-transparent">
                <svg class="w-5 h-5 opacity-70 group-hover:opacity-100 transition-opacity" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span class="font-medium text-[15px]">Submissions</span>
            </a>



        </nav>

        <!-- Logout -->
        <div class="p-6">
            <button (click)="logout()"
                class="flex items-center gap-3 text-slate-400 hover:text-rose-400 transition-all duration-150 group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="font-medium text-[15px]">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Container -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Top Navbar -->
        <header class="h-16 bg-white border-b border-border sticky top-0 z-30 flex items-center justify-between px-8">
            <!-- Breadcrumb -->
            <div class="flex items-center gap-4 text-[14px]">
                <span class="font-bold text-[#111827] text-[16px]">All Questions</span>
                <span class="text-slate-300 font-light scale-y-125 mx-1">|</span>
                <div class="flex items-center gap-2 text-slate-400">
                    <span class="hover:text-primary cursor-pointer transition-colors">Questions</span>
                    <span class="text-slate-300">/</span>
                    <span class="font-medium text-[#111827]">Manage</span>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <!-- Dashboard Quick Link -->
                <a *ngIf="user()?.role === 'admin'" routerLink="/admin/dashboard"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-50 text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-all text-[13px] font-semibold border border-slate-200">
                    <i class="bi bi-grid-fill"></i>
                    Dashboard
                </a>

                <!-- Global Chat Icon -->
                <div class="chat-icon-wrapper" (click)="toggleChat()"
                    style="color: #64748b; border: none; background: transparent; margin: 0; padding: 0; width: auto; height: auto;">
                    <i class="bi bi-chat-dots-fill text-xl hover:text-slate-900 transition-colors relative">
                        <span
                            class="absolute -top-1.5 -right-1.5 bg-rose-500 text-white text-[9px] font-bold min-w-[15px] h-[15px] rounded-full flex items-center justify-center border-2 border-white"
                            *ngIf="unreadCount() > 0">
                            {{ unreadCount() }}
                        </span>
                    </i>
                </div>

                <!-- Profile -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-[13px] font-bold text-[#111827] leading-none">Admin User</p>
                        <div
                            class="inline-flex items-center px-2 py-0.5 mt-1.5 rounded bg-cyan-50 border border-cyan-100">
                            <span class="text-[9px] text-cyan-500 uppercase tracking-widest font-black">Admin</span>
                        </div>
                    </div>
                    <div
                        class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-black text-sm shadow-lg shadow-primary/20 cursor-pointer hover:border-primary/30 transition-all border-2 border-white">
                        {{ user()?.username?.substring(0, 1) | uppercase }}
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Page Content -->
        <main class="flex-1 overflow-y-auto bg-background ">
            <div class="max-w-[1500px] mx-auto p-8">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
    <app-global-chat></app-global-chat>
</div>
