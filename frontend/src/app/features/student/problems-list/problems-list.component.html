<app-navbar></app-navbar>

<div class="min-h-screen bg-[#f8fafc] pt-24 pb-12 font-sans transition-opacity duration-500 fade-in">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Page Header & Stats -->
        <div class="mb-8 flex items-end justify-between">
            <div>
                <h1 class="text-[28px] font-bold text-[#1e293b] tracking-tight">Practice Problems</h1>
                <p class="mt-1.5 text-[#64748b] text-[15px]">Master algorithms and data structures with our curated
                    collection of coding challenges.</p>
            </div>
            <!-- Right Side Stat (Optional placeholder) -->
            <div class="hidden sm:block text-[#64748b] text-sm font-medium">
                <span class="text-[#0f172a] font-bold">{{ pagination.total }}</span> Problems
            </div>
        </div>

        <!-- Search & Difficulty Filter Toolbar -->
        <div
            class="bg-white rounded-xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-[#e2e8f0] p-4 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center transition-all">

            <!-- Search -->
            <div class="relative w-full md:max-w-md">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <i class="bi bi-search text-[#94a3b8] text-[15px]"></i>
                </div>
                <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="filterProblems()"
                    placeholder="Search problems by title, topic..."
                    class="block w-full pl-10 pr-4 py-2.5 border border-[#e2e8f0] rounded-lg text-[14px] bg-[#f8fafc] placeholder-[#94a3b8] text-[#334155] focus:outline-none focus:bg-white focus:ring-[3px] focus:ring-[#3b82f6]/10 focus:border-[#3b82f6] transition-all">
            </div>

            <!-- Difficulty Buttons -->
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar">
                <button (click)="setDifficulty('All')"
                    [class]="selectedDifficulty === 'All' ? 'bg-[#0f172a] text-white border-[#0f172a]' : 'bg-white text-[#475569] border-[#e2e8f0] hover:bg-[#f1f5f9] hover:text-[#0f172a]'"
                    class="px-4 py-2 rounded-lg text-[14px] font-medium border transition-colors whitespace-nowrap outline-none cursor-pointer">
                    All
                </button>
                <button (click)="setDifficulty('Easy')"
                    [class]="selectedDifficulty === 'Easy' ? 'bg-[#0f172a] text-white border-[#0f172a]' : 'bg-white text-[#475569] border-[#e2e8f0] hover:bg-[#f1f5f9] hover:text-[#0f172a]'"
                    class="px-4 py-2 rounded-lg text-[14px] font-medium border transition-colors whitespace-nowrap outline-none cursor-pointer">
                    Easy
                </button>
                <button (click)="setDifficulty('Medium')"
                    [class]="selectedDifficulty === 'Medium' ? 'bg-[#0f172a] text-white border-[#0f172a]' : 'bg-white text-[#475569] border-[#e2e8f0] hover:bg-[#f1f5f9] hover:text-[#0f172a]'"
                    class="px-4 py-2 rounded-lg text-[14px] font-medium border transition-colors whitespace-nowrap outline-none cursor-pointer">
                    Medium
                </button>
                <button (click)="setDifficulty('Hard')"
                    [class]="selectedDifficulty === 'Hard' ? 'bg-[#0f172a] text-white border-[#0f172a]' : 'bg-white text-[#475569] border-[#e2e8f0] hover:bg-[#f1f5f9] hover:text-[#0f172a]'"
                    class="px-4 py-2 rounded-lg text-[14px] font-medium border transition-colors whitespace-nowrap outline-none cursor-pointer">
                    Hard
                </button>
            </div>
        </div>

        <!-- Problems List Table Container -->
        <div
            class="bg-white rounded-xl shadow-[0_4px_16px_-6px_rgba(0,0,0,0.05)] border border-[#e2e8f0] overflow-hidden mb-8">

            <!-- Table Header -->
            <div
                class="grid grid-cols-[1fr_120px_120px] gap-4 px-6 py-3.5 border-b border-[#e2e8f0] bg-[#f8fafc] text-[12px] font-semibold text-[#64748b] uppercase tracking-wider hidden sm:grid">
                <div class="cursor-pointer hover:text-[#0f172a] transition-colors group">
                    Title <i
                        class="bi bi-arrow-down flex-inline opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
                <div class="text-right cursor-pointer hover:text-[#0f172a] transition-colors group">
                    Acceptance <i
                        class="bi bi-arrow-down flex-inline opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
                <div class="text-center cursor-pointer hover:text-[#0f172a] transition-colors group">
                    Difficulty <i
                        class="bi bi-arrow-down flex-inline opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
            </div>

            <!-- Table Body -->
            <div *ngIf="problems.length > 0" class="divide-y divide-[#f1f5f9]">
                <div *ngFor="let p of problems; let i = index" (click)="viewProblem(p._id || p.id)"
                    class="group grid grid-cols-1 sm:grid-cols-[1fr_120px_120px] gap-4 px-6 py-4 items-center hover:bg-[#f8fafc] transition-colors cursor-pointer">

                    <!-- Title & Concepts Column -->
                    <div class="flex flex-col min-w-0 pr-4">
                        <div class="flex items-center gap-2.5">
                            <span
                                class="text-[15px] font-semibold text-[#1e293b] group-hover:text-[#3b82f6] transition-colors truncate">{{
                                p.title }}</span>
                            <i *ngIf="p.isLocked" class="bi bi-lock-fill text-[#94a3b8] text-[13px] ml-0.5"
                                title="Premium"></i>
                        </div>
                        <!-- Topic Tags below Title -->
                        <div class="flex items-center gap-2 pl-0 mt-1.5">
                            <span
                                class="px-2 py-0.5 rounded-md text-[11px] font-medium bg-[#f1f5f9] text-[#64748b] leading-none">{{
                                p.category }}</span>
                            <span *ngIf="i % 2 === 0"
                                class="px-2 py-0.5 rounded-md text-[11px] font-medium bg-[#f1f5f9] text-[#64748b] leading-none hidden md:inline-block">Array</span>
                        </div>
                    </div>

                    <!-- Acceptance Column -->
                    <div class="text-right text-[14px] font-medium text-[#475569] hidden sm:block">
                        {{ 30 + (i * 2.5) | number:'1.1-1' }}%
                    </div>

                    <!-- Difficulty Column -->
                    <div class="flex justify-start sm:justify-center mt-3 sm:mt-0 pl-[30px] sm:pl-0">
                        <span [ngClass]="{
                'text-[#10b981]': p.difficulty.toLowerCase() === 'easy',
                'text-[#f59e0b]': p.difficulty.toLowerCase() === 'medium',
                'text-[#ef4444]': p.difficulty.toLowerCase() === 'hard'
             }" class="text-[13px] font-medium capitalize">
                            {{ p.difficulty }}
                        </span>
                    </div>
                </div>
            </div>

        </div>

        <!-- Loading State -->
        <div *ngIf="isLoading"
            class="min-h-[400px] flex flex-col items-center justify-center bg-white rounded-xl shadow-[0_4px_16px_-6px_rgba(0,0,0,0.05)] border border-[#e2e8f0]">
            <div class="w-12 h-12 border-4 border-[#e2e8f0] border-t-[#3b82f6] rounded-full animate-spin mb-4"></div>
            <p class="text-[#64748b] font-medium animate-pulse">Loading problems...</p>
        </div>

        <!-- Pagination Controls -->
        <!-- Minimalist LeetCode style pagination -->
        <div class="flex justify-center md:justify-end items-center mb-12"
            *ngIf="!isLoading && pagination.totalPages > 1">
            <nav class="inline-flex rounded-lg shadow-sm" aria-label="Pagination">
                <button [disabled]="pagination.page === 1" (click)="onPageChange(pagination.page - 1)"
                    class="relative inline-flex items-center rounded-l-lg px-3 py-2 bg-white text-[#64748b] border border-[#e2e8f0] hover:bg-[#f8fafc] focus:z-20 disabled:opacity-40 disabled:cursor-not-allowed transition-colors outline-none cursor-pointer">
                    <span class="sr-only">Previous</span>
                    <i class="bi bi-chevron-left text-sm"></i>
                </button>

                <button *ngFor="let p of [].constructor(pagination.totalPages); let idx = index"
                    (click)="onPageChange(idx + 1)"
                    [class]="pagination.page === idx + 1 ? 'relative z-10 inline-flex items-center bg-[#f1f5f9] px-4 py-2 text-[14px] font-semibold text-[#0f172a] border border-[#e2e8f0]' : 'relative inline-flex items-center bg-white px-4 py-2 text-[14px] font-medium text-[#64748b] border border-[#e2e8f0] hover:bg-[#f8fafc] focus:z-20 transition-colors outline-none cursor-pointer'">
                    {{ idx + 1 }}
                </button>

                <button [disabled]="pagination.page === pagination.totalPages"
                    (click)="onPageChange(pagination.page + 1)"
                    class="relative inline-flex items-center rounded-r-lg px-3 py-2 bg-white text-[#64748b] border border-[#e2e8f0] hover:bg-[#f8fafc] focus:z-20 disabled:opacity-40 disabled:cursor-not-allowed transition-colors outline-none cursor-pointer">
                    <span class="sr-only">Next</span>
                    <i class="bi bi-chevron-right text-sm"></i>
                </button>
            </nav>
        </div>

    </div>
</div>
